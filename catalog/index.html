<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catalog - Heavy Metal UI</title>

<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
html,body{
margin:0;
padding:0;
background:#0b0b0b;
font-family:Inter,system-ui,sans-serif;
overflow-x:hidden;
}

#root{
min-height:100vh;
width:100%;
}

::-webkit-scrollbar{display:none;}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

function App(){

  { name:"Backhoe Loader BL-200", type:"MULTI-USE", price:"$500/day", img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTe7bCCrey2A3Tt8I_G1Ga_8-ziJ5Qvlu8y7pNzG_WAo6OgzL27pCGYZxo&s=10" },

  { name:"Skid Steer SS-100", type:"COMPACT", price:"$350/day", img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRSqVucI7_yIzCJlRD8Gj94rxLmtIfRIGJwIZvBqOsHnon_UJjPGysm3wcr&s=10" },

  { name:"Jackhammer JH-90", type:"HAND TOOL", price:"$80/day", img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQMeWAhEgBjwH64dR7Qus5FNjtqvYMmDlNNNUI_yW4jXQ&s=10" },
  { name:"Scaffolding Set SC-300", type:"STRUCTURE", price:"$200/day", img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTGli9e1t2hj816Xs9LNgMyGbTLAiuTeBwfG6QCJQdzJGkIi1J_kCVhL_KL&s=10" },
  { name:"Wheel Loader WL-450", type:"HEAVY DUTY", price:"$750/day", img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcReWNA_2dEWbTc-Vk5EHSEpeXGImnduhgetDr4XsPlz7yhTW3RgeYNZf-U&s=10" },
  { name:"Asphalt Paver AP-600", type:"ROAD WORK", price:"$1100/day", img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ7mhZwrRXdeHQHBPiJvc__1lTs346l1poPPzQDRjnmPrncStlgbX30Lek&s=10" },

  { name:"Trencher TR-200", type:"TRENCHING", price:"$300/day", img:"https://img.directindustry.com/images_di/photo-g/22663-11993338.jpg" },
  { name:"Air Compressor AC-150", type:"UTILITY", price:"$120/day", img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS8EgjFtuoDPp71PAJhe2mHR-M9cgWP2BAlxVieWnq9RTt4iibLhnhk0Hk&s=10" },
  { name:"Concrete Vibrator CV-50", type:"FINISHING", price:"$60/day", img:"https://images.unsplash.com/photo-1590642916810-3b5f8b8b8f4a?q=80&w=1200&auto=format&fit=crop" },
  { name:"Mobile Crane MC-500", type:"HEAVY LIFT", price:"$1300/day", img:"https://images.unsplash.com/photo-1600585153490-76fb20a32601?q=80&w=1200&auto=format&fit=crop" },

  { name:"Compactor CP-220", type:"COMPACTION", price:"$280/day", img:"https://images.unsplash.com/photo-1600585154352-0b2f8f9d9b2a?q=80&w=1200&auto=format&fit=crop" },

  { name:"Pile Driver PD-800", type:"FOUNDATION", price:"$1500/day", img:"https://images.unsplash.com/photo-1600585153333-2a3b4c5d6e7f?q=80&w=1200&auto=format&fit=crop" },
  { name:"Surveying Total Station ST-90", type:"SURVEYING", price:"$200/day", img:"https://images.unsplash.com/photo-1581093588401-12d5b6c8f7a3?q=80&w=1200&auto=format&fit=crop" },

  { name:"Rebar Bender RB-70", type:"STEEL WORK", price:"$90/day", img:"https://images.unsplash.com/photo-1581092795360-1c4f5d6e7a8b?q=80&w=1200&auto=format&fit=crop" },
  { name:"Portable Generator PG-500", type:"POWER", price:"$180/day", img:"https://images.unsplash.com/photo-1600585154150-3a7b8c9d0e1f?q=80&w=1200&auto=format&fit=crop" },
  { name:"Drilling Rig DR-1000", type:"HEAVY DUTY", price:"$2000/day", img:"https://images.unsplash.com/photo-1581092334975-6c7d8e9f0a1b?q=80&w=1200&auto=format&fit=crop" },
  { name:"Water Pump WP-60", type:"UTILITY", price:"$70/day", img:"https://images.unsplash.com/photo-1581092334000-1a2b3c4d5e6f?q=80&w=1200&auto=format&fit=crop" }
];

const types = [
  "ALL",
  "COMPACT",
  "MID-RANGE",
  "HEAVY DUTY",
  "PREMIUM",
  "STANDARD",
  "INDUSTRIAL",
  "MULTI-USE",
  "HAND TOOL",
  "STRUCTURE",
  "ROAD WORK",
  "TRENCHING",
  "UTILITY",
  "FINISHING",
  "HEAVY LIFT",
  "COMPACTION",
  "CUTTING",
  "FOUNDATION",
  "SURVEYING",
  "STEEL WORK",
  "POWER"
];

const filtered = filter === "ALL"
? cards
: cards.filter(c => c.type === filter);

const goToBooking = (card) => {
const query = new URLSearchParams({
name: card.name,
type: card.type,
price: card.price,
img: card.img
}).toString();

window.location.href = "/view-catalog?" + query;
};

return(
<div className="min-h-screen bg-[#0b0b0b] text-white">

{/* HEADER */}
<div className="px-5 pt-6 pb-3">
<h1 className="text-3xl font-black">CATALOG</h1>
<p className="text-white/50 text-sm mt-1">Browse available heavy machines</p>
</div>

{/* FILTER BAR */}
<div className="px-5 flex gap-2 overflow-x-auto pb-4">
{types.map((t,i)=>(
<button
key={i}
onClick={()=>setFilter(t)}
className={`px-4 py-2 rounded-full text-xs font-bold whitespace-nowrap border
${filter===t
? "bg-yellow-400 text-black border-yellow-400"
: "bg-[#171717] text-white/60 border-white/10"
}`}
>
{t}
</button>
))}
</div>

{/* GRID */}
<div className="px-5 grid grid-cols-1 md:grid-cols-2 gap-4 pb-28">

{filtered.map((card,i)=>(
<div
key={i}
className="bg-[#171717] rounded-2xl overflow-hidden border border-white/5"
>

<img src={card.img} className="h-[180px] w-full object-cover"/>

<div className="p-4">

<div className="flex justify-between items-start">
<div>
<h3 className="font-bold text-lg">{card.name}</h3>
<div className="text-white/50 text-xs">{card.type}</div>
</div>

<div className="text-yellow-400 font-bold">
{card.price}
</div>
</div>

<button
onClick={() => goToBooking(card)}
className="mt-4 w-full bg-yellow-400 text-black font-bold py-2 rounded-lg text-sm"
>
START BOOKING
</button>

</div>
</div>
))}

</div>

{/* FOOTER */}
<div className="px-5 border-t border-white/10 pt-10 pb-28">
<h2 className="font-black text-xl">Pipeline Construction Tool</h2>
<p className="text-white/50 text-sm mt-2">
Premium excavation equipment rentals for construction and industrial projects.
</p>

<div className="mt-6 text-white/50 text-sm space-y-1">
<div>help@pipelineconstructiontool.site</div>
</div>

<div className="text-center text-white/30 text-xs mt-10">
© 2026 Pipeline Construction Tool
</div>
</div>

{/* BOTTOM NAV */}
<div className="fixed bottom-4 left-4 right-4 max-w-[700px] mx-auto h-[78px] rounded-[28px] bg-[#232323] border border-[#353535] flex items-center justify-around">

<div className="flex flex-col items-center cursor-pointer" onClick={() => window.location.href = "/"}>
<img src="https://www.svgrepo.com/show/529021/home-angle.svg" className="w-5 h-5 invert brightness-0"/>
<span className="text-[10px] mt-1 text-white/60">HOME</span>
</div>

<div className="flex flex-col items-center cursor-pointer" onClick={() => window.location.href = "/catalog"}>
<img src="https://www.svgrepo.com/show/506211/grid-4.svg" className="w-5 h-5 invert brightness-0"/>
<span className="text-[10px] mt-1 text-white font-bold">CATALOG</span>
</div>

<div className="flex flex-col items-center cursor-pointer" onClick={() => window.location.href = "/rental"}>
<img src="https://www.svgrepo.com/show/507547/briefcase-alt.svg" className="w-5 h-5 invert brightness-0"/>
<span className="text-[10px] mt-1 text-white/60">RENTALS</span>
</div>

<div className="flex flex-col items-center cursor-pointer" onClick={() => window.location.href = "/support"}>
<img src="https://www.svgrepo.com/show/471510/help-circle.svg" className="w-5 h-5 invert brightness-0"/>
<span className="text-[10px] mt-1 text-white/60">SUPPORT</span>
</div>

</div>

</div>
);
}

// SAFE MOUNT (prevents blank screen issues)
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

</script>
</body>
</html>
