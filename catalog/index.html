  { name:"Komatsu WA1200 Loader", type:"MINING", price:"$5,400,000", img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQAKyL7HrA4nUwK7NJ_phdBmNT-CZXfyZzibgJgqCgA3w&s=10" }

const types=["ALL","COMPACT","HEAVY DUTY","PREMIUM"];
let filter="ALL";

function render(){
const filtered = filter==="ALL" ? cards : cards.filter(c=>c.type===filter);

document.getElementById('app').innerHTML=`
<div class="px-5 pt-6 pb-3">
<h1 class="text-3xl font-black">CATALOG</h1>
<p class="text-white/50 text-sm mt-1">Browse available heavy machines</p>
</div>

<div id="filters" class="px-5 flex gap-2 overflow-x-auto pb-4"></div>

<div class="px-5 grid grid-cols-1 md:grid-cols-2 gap-4 pb-28">
${filtered.map(card=>`
<div class="bg-[#171717] rounded-2xl overflow-hidden border border-white/5">
<img src="${card.img}" class="h-[180px] w-full object-cover">
<div class="p-4">
<div class="flex justify-between items-start">
<div>
<h3 class="font-bold text-lg">${card.name}</h3>
<div class="text-white/50 text-xs">${card.type}</div>
</div>
<div class="text-yellow-400 font-bold">${card.price}</div>
</div>
<button onclick='goToBooking(${JSON.stringify(card)})'
class="mt-4 w-full bg-yellow-400 text-black font-bold py-2 rounded-lg text-sm">
MAKE PURCHASE
</button>
</div></div>`).join('')}
</div>`;

document.getElementById('filters').innerHTML = types.map(t=>`
<button onclick="setFilter('${t}')"
class="px-4 py-2 rounded-full text-xs font-bold whitespace-nowrap border ${filter===t?'bg-yellow-400 text-black border-yellow-400':'bg-[#171717] text-white/60 border-white/10'}">${t}</button>
`).join('');
}

function setFilter(t){ filter=t; render(); }

function goToBooking(card){
const query = new URLSearchParams(card).toString();
window.location.href="/view-catalog?"+query;
}

render();
</script>
