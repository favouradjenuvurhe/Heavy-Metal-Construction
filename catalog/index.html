<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catalog</title>

<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
html,body{
margin:0;
padding:0;
background:#0b0b0b;
font-family:Inter,system-ui,sans-serif;
overflow-x:hidden;
}

#root{
min-height:100vh;
width:100%;
}

::-webkit-scrollbar{display:none;}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

function App(){

const [filter, setFilter] = React.useState("ALL");

const cards = [
  { name:"CX-250 Excavator", type:"HEAVY DUTY", price:"$45,000", img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ8tlxHw8eYVXOpfEoR8v2JW0HGHldXUeP99SAZMCLKipfUeFm26xJt1bg&s=10" },
  { name:"ZX-150 Mini Excavator", type:"COMPACT", price:"$32,000", img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSpXbtQgBXT5N7SqiFqVT-05OzSPXaJk1ZblcqfvJNZ4tY9IPqJdby61ro_&s=10" },
  { name:"MX-400 Bulldozer", type:"HEAVY DUTY", price:"$78,000", img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS9MmUae3yK3USQCzLLnDkot6NKbc8cEtZisoVm7FZaxLiSsMxa2beRPKw&s=10" },
  { name:"RX-300 Loader", type:"PREMIUM", price:"$62,000", img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRJuZ5VDxT4CsMw-lyPiHikoBcSK32M9jXC0Bdi8njsRQ&s=10" },

  { name:"Tower Crane TC-900", type:"HEAVY DUTY", price:"$320,000", img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR1p_s_I8MKNeDJXoSC_diQkxNdpCwn6ZafstOzUln3b6UU0K1UrTgV-UiS&s=10" },
  { name:"Concrete Mixer CM-120", type:"STANDARD", price:"$15,000", img:"https://image.made-in-china.com/318f0j00tabGgMNETLzD/4-26-1-mp4.webp" },
  { name:"Road Roller RR-500", type:"HEAVY DUTY", price:"$70,000", img:"https://image.made-in-china.com/2f0j00gbYolEQcVHrK/Baby-Road-Roller-500kg-600kg-700kg-800kg-Double-Drumroller.jpg" },
  { name:"Forklift FL-2500", type:"INDUSTRIAL", price:"$40,000", img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTsQ1OdYN9cwZjMbH7FWJCjin7z7RAZstVj-CeRa5jqJw&s=10" },

  { name:"Backhoe Loader BL-200", type:"MULTI-USE", price:"$50,000", img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTe7bCCrey2A3Tt8I_G1Ga_8-ziJ5Qvlu8y7pNzG_WAo6OgzL27pCGYZxo&s=10" },
  { name:"Dump Truck DT-800", type:"HEAVY DUTY", price:"$65,000", img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT2AcQc2yVgbzDcUh8HEtMG9v1jwHwUMpVlH1Mu9Kp8DUf21vfqZS87UvA&s=10" },
  { name:"Skid Steer SS-100", type:"COMPACT", price:"$35,000", img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRSqVucI7_yIzCJlRD8Gj94rxLmtIfRIGJwIZvBqOsHnon_UJjPGysm3wcr&s=10" },
  { name:"Concrete Pump CP-700", type:"HEAVY DUTY", price:"$90,000", img:"https://www.cable-pullingtools.com/photo/cable-pullingtools/video/20241129_67495bec6f2d9.mp4.jpg?1732861397" },

  { name:"Jackhammer JH-90", type:"HAND TOOL", price:"$8,000", img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQMeWAhEgBjwH64dR7Qus5FNjtqvYMmDlNNNUI_yW4jXQ&s=10" },
  { name:"Scaffolding Set SC-300", type:"STRUCTURE", price:"$20,000", img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTGli9e1t2hj816Xs9LNgMyGbTLAiuTeBwfG6QCJQdzJGkIi1J_kCVhL_KL&s=10" },
  { name:"Wheel Loader WL-450", type:"HEAVY DUTY", price:"$75,000", img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcReWNA_2dEWbTc-Vk5EHSEpeXGImnduhgetDr4XsPlz7yhTW3RgeYNZf-U&s=10" },
  { name:"Asphalt Paver AP-600", type:"ROAD WORK", price:"$11,000", img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ7mhZwrRXdeHQHBPiJvc__1lTs346l1poPPzQDRjnmPrncStlgbX30Lek&s=10" },

  { name:"Trencher TR-200", type:"TRENCHING", price:"$30,000", img:"https://img.directindustry.com/images_di/photo-g/22663-11993338.jpg" },
  { name:"Air Compressor AC-150", type:"UTILITY", price:"$12,000", img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS8EgjFtuoDPp71PAJhe2mHR-M9cgWP2BAlxVieWnq9RTt4iibLhnhk0Hk&s=10" },
  { name:"Concrete Vibrator CV-50", type:"FINISHING", price:"$60,000", img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR6PXtygq1vP3GChk63vMicieQXPMx_EQrtrckaxGLt7g&s" },
  { name:"Mobile Crane MC-500", type:"HEAVY LIFT", price:"$13,000", img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTWUXdoxgpdvTzZ7FpT8xSRBYRYM5lfOX-vIVKtGQpMKg&s=10" },

  { name:"Compactor CP-220", type:"COMPACTION", price:"$28,000", img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSSckv51p_HYoxwmh-Zka59AdhdRtVPuCEPvT4kdCkA5S3v7pA3V36keA0&s=10" },
  { name:"Pile Driver PD-800", type:"FOUNDATION", price:"$15,000", img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQr0lZMZmxqadbfLBEpj6K99ABjXKvU_5twEopppsbPYyASiy0hQMa1On9n&s=10" },
  { name:"Surveying Total Station ST-90", type:"SURVEYING", price:"$20,000", img:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQmha_VJ7gPrGb575WvlbYH85TIKjJvCThOfdcEBXfvXWn4qt9It69y3Z4&s=10" }
];

const types = [
  "ALL",
  "COMPACT",
  "MID-RANGE",
  "HEAVY DUTY",
  "PREMIUM",
  "STANDARD",
  "INDUSTRIAL",
  "MULTI-USE",
  "HAND TOOL",
  "STRUCTURE",
  "ROAD WORK",
  "TRENCHING",
  "UTILITY",
  "FINISHING",
  "HEAVY LIFT",
  "COMPACTION",
  "CUTTING",
  "FOUNDATION",
  "SURVEYING",
  "STEEL WORK",
  "POWER"
];

const filtered = filter === "ALL"
? cards
: cards.filter(c => c.type === filter);

const goToBooking = (card) => {
const query = new URLSearchParams({
name: card.name,
type: card.type,
price: card.price,
img: card.img
}).toString();

window.location.href = "/view-catalog?" + query;
};

return(
<div className="min-h-screen bg-[#0b0b0b] text-white">

{/* HEADER */}
<div className="px-5 pt-6 pb-3">
<h1 className="text-3xl font-black">CATALOG</h1>
<p className="text-white/50 text-sm mt-1">Browse available heavy machines</p>
</div>

{/* FILTER BAR */}
<div className="px-5 flex gap-2 overflow-x-auto pb-4">
{types.map((t,i)=>(
<button
key={i}
onClick={()=>setFilter(t)}
className={`px-4 py-2 rounded-full text-xs font-bold whitespace-nowrap border
${filter===t
? "bg-yellow-400 text-black border-yellow-400"
: "bg-[#171717] text-white/60 border-white/10"
}`}
>
{t}
</button>
))}
</div>

{/* GRID */}
<div className="px-5 grid grid-cols-1 md:grid-cols-2 gap-4 pb-28">

{filtered.map((card,i)=>(
<div
key={i}
className="bg-[#171717] rounded-2xl overflow-hidden border border-white/5"
>

<img src={card.img} className="h-[180px] w-full object-cover"/>

<div className="p-4">

<div className="flex justify-between items-start">
<div>
<h3 className="font-bold text-lg">{card.name}</h3>
<div className="text-white/50 text-xs">{card.type}</div>
</div>

<div className="text-yellow-400 font-bold">
{card.price}
</div>
</div>

<button
onClick={() => goToBooking(card)}
className="mt-4 w-full bg-yellow-400 text-black font-bold py-2 rounded-lg text-sm"
>
MAKE PURCHASE
</button>

</div>
</div>
))}

</div>

{/* FOOTER */}
<div className="px-5 border-t border-white/10 pt-10 pb-28">
<h2 className="font-black text-xl">Pipeline Construction Tool</h2>
<p className="text-white/50 text-sm mt-2">
Premium excavation equipment rentals for construction and industrial projects.
</p>

<div className="mt-6 text-white/50 text-sm space-y-1">
<div>help@pipelineconstructiontool.site</div>
</div>

<div className="text-center text-white/30 text-xs mt-10">
© 2026 Pipeline Construction Tool
</div>
</div>

{/* BOTTOM NAV */}
<div className="fixed bottom-4 left-4 right-4 max-w-[700px] mx-auto h-[78px] rounded-[28px] bg-[#232323] border border-[#353535] flex items-center justify-around">

<div className="flex flex-col items-center cursor-pointer" onClick={() => window.location.href = "/"}>
<img src="https://www.svgrepo.com/show/529021/home-angle.svg" className="w-5 h-5 invert brightness-0"/>
<span className="text-[10px] mt-1 text-white/60">HOME</span>
</div>

<div className="flex flex-col items-center cursor-pointer" onClick={() => window.location.href = "/catalog"}>
<img src="https://www.svgrepo.com/show/506211/grid-4.svg" className="w-5 h-5 invert brightness-0"/>
<span className="text-[10px] mt-1 text-white font-bold">CATALOG</span>
</div>

<div className="flex flex-col items-center cursor-pointer" onClick={() => window.location.href = "/rental"}>
<img src="https://www.svgrepo.com/show/507547/briefcase-alt.svg" className="w-5 h-5 invert brightness-0"/>
<span className="text-[10px] mt-1 text-white/60">RENTALS</span>
</div>

<div className="flex flex-col items-center cursor-pointer" onClick={() => window.location.href = "/support"}>
<img src="https://www.svgrepo.com/show/471510/help-circle.svg" className="w-5 h-5 invert brightness-0"/>
<span className="text-[10px] mt-1 text-white/60">SUPPORT</span>
</div>

</div>

</div>
);
}

// SAFE MOUNT (prevents blank screen issues)
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

</script>
</body>
